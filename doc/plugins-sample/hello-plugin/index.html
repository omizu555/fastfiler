<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Hello Plugin</title>
    <style>
      body { font-family: system-ui, sans-serif; padding: 12px; color: #222; }
      h1 { font-size: 14px; margin: 0 0 8px; }
      button { padding: 4px 8px; margin: 0 4px 4px 0; }
      pre { background: #f5f5f5; padding: 6px; font-size: 11px; max-height: 220px; overflow: auto; }
      input { width: 90%; padding: 3px; }
    </style>
  </head>
  <body>
    <h1>👋 Hello Plugin</h1>
    <p>FastFiler 公開 API の動作確認用サンプル。</p>
    <div>
      <input id="path" placeholder="例: C:\\Windows" />
    </div>
    <div style="margin-top:6px;">
      <button id="ls">fs.read.dir</button>
      <button id="cat">fs.read.text</button>
      <button id="open">shell.open</button>
    </div>
    <pre id="out">(結果)</pre>
    <script>
      let nextId = 1;
      const pending = new Map();
      window.addEventListener("message", (ev) => {
        const d = ev.data;
        if (!d || d.__ff !== "result") return;
        const cb = pending.get(d.id);
        if (cb) { pending.delete(d.id); cb(d); }
      });
      function invoke(capability, args) {
        return new Promise((resolve) => {
          const id = nextId++;
          pending.set(id, resolve);
          parent.postMessage({ __ff: "invoke", id, capability, args }, "*");
        });
      }
      const out = document.getElementById("out");
      const path = document.getElementById("path");
      async function run(cap) {
        out.textContent = "...";
        const r = await invoke(cap, { path: path.value });
        out.textContent = JSON.stringify(r, null, 2);
      }
      document.getElementById("ls").onclick = () => run("fs.read.dir");
      document.getElementById("cat").onclick = () => run("fs.read.text");
      document.getElementById("open").onclick = () => run("shell.open");
    </script>
  </body>
</html>
